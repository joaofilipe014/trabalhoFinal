<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contato — João Filipe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">João Filipe</a>
      <button class="nav-toggle" id="navToggle4" aria-label="Abrir menu">☰</button>
      <nav class="nav" id="mainNav4" aria-label="Menu principal">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="projetos.html">Projetos</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
      <button class="theme-toggle" id="themeToggle4" aria-label="Alternar tema">🌙</button>
    </div>
  </header>

  <main class="container">
    <header class="page-header">
      <h1>Contato</h1>
      <p>Fique à vontade para enviar uma mensagem.</p>
    </header>

    <section class="contact-form">
      <form id="contactForm">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Mensagem</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button class="btn primary" type="submit">Enviar</button>
        <p class="form-feedback" id="formFeedback" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 João Filipe</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
